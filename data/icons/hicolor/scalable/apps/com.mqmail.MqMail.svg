<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6FF0"/>
      <stop offset="100%" stop-color="#3B44C4"/>
    </linearGradient>
    <linearGradient id="envBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEEDF5"/>
    </linearGradient>
    <linearGradient id="envFlap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F4FF"/>
      <stop offset="100%" stop-color="#DDD9F2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Queue stack: back envelope (farthest) -->
  <rect x="32" y="30" width="64" height="40" rx="4" fill="#fff" opacity="0.25"/>

  <!-- Queue stack: middle envelope -->
  <rect x="28" y="36" width="72" height="42" rx="5" fill="#fff" opacity="0.45"/>

  <!-- Front envelope: body -->
  <rect x="22" y="44" width="84" height="52" rx="6" fill="url(#envBody)"/>

  <!-- Front envelope: flap (V-fold pointing down into the body) -->
  <path d="M 22 50 C 22 47 24 44 28 44 L 100 44 C 104 44 106 47 106 50 L 64 78 Z"
        fill="url(#envFlap)"/>

  <!-- Flap edge highlight -->
  <path d="M 24 48 L 64 76 L 104 48" fill="none" stroke="#AEA6E0"
        stroke-width="0.75" opacity="0.5"/>

  <!-- Queue indicator: three horizontal lines on the envelope body
       representing queued/stacked messages -->
  <line x1="38" y1="84" x2="90" y2="84" stroke="#9B8FE0" stroke-width="2.5"
        stroke-linecap="round" opacity="0.55"/>
  <line x1="42" y1="90" x2="86" y2="90" stroke="#9B8FE0" stroke-width="2"
        stroke-linecap="round" opacity="0.35"/>
</svg>
